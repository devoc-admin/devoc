name: CI check for types, linting, formatting, and build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  types:
    name: "Check types on changed files"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun x turbo types

  db-migration-check:
    name: "Check database migrations"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Check migrations
        env:
          PAYLOAD_SECRET: ${{ secrets.SAVEURS_AUDE_PAYLOAD_SECRET }}
        run: bun x turbo db:migration:check

  lint-and-format:
    name: "Lint and format check"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: bun x turbo lint format

  build:
    name: "Build apps and packages"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: payload
          POSTGRES_PASSWORD: password
          POSTGRES_DB: saveurs_aude
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Apply migrations
        env:
          DATABASE_URL: postgresql://payload:password@localhost:5432/saveurs_aude
          PAYLOAD_SECRET: ${{ secrets.SAVEURS_AUDE_PAYLOAD_SECRET }}
        run: bun x turbo db:deploy
      - name: Build
        env:
          DATABASE_URL: postgresql://payload:password@localhost:5432/saveurs_aude
          PAYLOAD_SECRET: ${{ secrets.SAVEURS_AUDE_PAYLOAD_SECRET }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.SAVEURS_AUDE_NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_URL: ${{ vars.SAVEURS_AUDE_NEXT_PUBLIC_URL }}
        run: bun x turbo build
