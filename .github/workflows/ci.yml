on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
  TURBO_SCM_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  types:
    name: "Check types on changed files"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - run: bun x turbo types --affected

  db-migration-check:
    name: "Check database migrations"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Check migrations
        env:
          PAYLOAD_SECRET: "ci-dummy-secret-for-config-validation-only-not-used-at-runtime"
        run: bun x turbo db:migration:check --affected

  lint-and-format:
    name: "Lint and format check"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - run: bun x turbo lint format --affected

  build:
    name: "Build apps and packages"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: payload
          POSTGRES_PASSWORD: password
          POSTGRES_DB: saveurs_aude
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --tmpfs /var/lib/postgresql/data:rw
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Apply migrations
        env:
          DATABASE_URL: postgresql://payload:password@localhost:5432/saveurs_aude
          PAYLOAD_SECRET: ${{ secrets.SAVEURS_AUDE_PAYLOAD_SECRET }}
        run: bun x turbo db:deploy --affected
      - name: Build
        env:
          DATABASE_URL: postgresql://payload:password@localhost:5432/saveurs_aude
          PAYLOAD_SECRET: ${{ secrets.SAVEURS_AUDE_PAYLOAD_SECRET }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.SAVEURS_AUDE_NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_URL: ${{ vars.SAVEURS_AUDE_NEXT_PUBLIC_URL }}
        run: bun x turbo build --affected
