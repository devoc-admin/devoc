name: CI check for types, linting, formatting, and build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  types:
    name: "Check types on changed files"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun x turbo types

  lint-and-format:
    name: "Lint and format check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun x turbo lint format

  build:
    name: "Build apps and packages"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun xturbo build
