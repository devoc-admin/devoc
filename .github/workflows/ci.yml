name: "Github Actions"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
  TURBO_SCM_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  types:
    name: "Check types on changed files"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dopplerhq/secrets-fetch-action@v1.3.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN_SHARED }}
          inject-env-vars: true
      - uses: ./.github/actions/setup
      - run: bun x turbo types --affected

  db-migration-check:
    name: "Check database migrations"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dopplerhq/secrets-fetch-action@v1.3.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN_SHARED }}
          inject-env-vars: true
      - uses: ./.github/actions/setup
      - name: Check migrations
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_SHARED }}
          PAYLOAD_SECRET: "ci-dummy-secret-for-config-validation-only-not-used-at-runtime"
        run: bun x turbo db:migration:check --affected

  boundaries:
    name: "Check workspace boundaries"
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - run: bun x turbo boundaries

  lint-and-format:
    name: "Lint and format check"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dopplerhq/secrets-fetch-action@v1.3.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN_SHARED }}
          inject-env-vars: true
      - uses: ./.github/actions/setup
      - run: bun x turbo lint format --affected

  build:
    name: "Build apps and packages"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: payload
          POSTGRES_PASSWORD: password
          POSTGRES_DB: saveurs_aude
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --tmpfs /var/lib/postgresql/data:rw
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Fetch shared CI secrets
        uses: dopplerhq/secrets-fetch-action@v1.3.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN_SHARED }}
          inject-env-vars: true
      - name: Fetch saveurs-aude prod secrets
        uses: dopplerhq/secrets-fetch-action@v1.3.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN_SAVEURS_PRD }}
          inject-env-vars: true
      - uses: ./.github/actions/setup
      - name: Apply migrations
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_SAVEURS_PRD }}
          DATABASE_URL: postgresql://payload:password@localhost:5432/saveurs_aude
        run: bun x turbo db:deploy --affected
      - name: Build
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN_SAVEURS_PRD }}
          DATABASE_URL: postgresql://payload:password@localhost:5432/saveurs_aude
        run: bun x turbo build --affected
