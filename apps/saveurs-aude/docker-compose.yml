services:
  db:
    image: postgres:15-alpine
    container_name: saveurs-aude-db
    restart: always
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: password
      POSTGRES_DB: saveurs_aude
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
