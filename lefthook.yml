pre-commit:
  parallel: true
  # 🧽 Linter with safe fixs applied
  jobs:
    - name: Lint changed files
      run: bun x ultracite fix {staged_files}
      glob:
        - "*.js"
        - "*.jsx"
        - "*.ts"
        - "*.tsx"
        - "*.json"
        - "*.jsonc"
        - "*.css"
      stage_fixed: true
    - name: Check types on changed files
      run: doppler run -- bun x turbo types --affected
    - name: Check database migrations
      run: doppler run -- bun x turbo db:migration:check --affected
pre-push:
  jobs:
    - name: "Check bun lockfile is in sync"
      run: bun install --frozen-lockfile
    - name: "Check generated artifacts are up to date"
      run: doppler run -- bun x turbo gen:check --affected
commit-msg:
  jobs:
    - name: commitlint
      run: bun x commitlint --edit {1}
