pre-commit:
  paralelle: true
  # 🧽 Linter with safe fixs applied
  jobs:
    - name: Lint changed files
      run: bun x ultracite fix {staged_files}
      glob:
        - "*.js"
        - "*.jsx"
        - "*.ts"
        - "*.tsx"
        - "*.json"
        - "*.jsonc"
        - "*.css"
      stage_fixed: true
    - name: Check types on changed files
      run: turbo types --affected
    - name: Check database migrations
      run: turbo db:migration:check --affected
pre-push:
  jobs:
    - name: "Build apps and packages"
      run: turbo build --dry-run text --affected
commit-msg:
  commands:
    commitlint:
      run: bun x commitlint --edit {1}
